# Render Blueprint - 电玩店包间计时管理系统
#
# 使用方法:
# 1. 确保你已经 fork 了本仓库
# 2. 登录 Render (https://render.com)
# 3. 点击 "New" -> "Blueprint"
# 4. 选择你的 GitHub 仓库 (gaming-room-timer)
# 5. Render 会自动读取本文件并创建 Web 服务 + PostgreSQL 数据库

databases:
  # 免费版 PostgreSQL（90 天后会休眠，但免费空间持续可用）
  - name: gaming-room-db
    plan: free
    region: singapore  # 必须与 Web Service 同 region，否则内部 DNS 不可达
    databaseName: gaming_room
    user: gaming_room
    ipAllowList: []  # 允许所有 IP 访问（同 Region 默认内网访问）

services:
  # Flask Web 应用
  - type: web
    name: gaming-room-timer
    env: python
    region: singapore  # 离中国最近的节点
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /
    autoDeploy: true  # 推送代码自动部署
    envVars:
      # 数据库连接自动从上面创建的 PostgreSQL 服务注入
      - key: DATABASE_URL
        fromDatabase:
          name: gaming-room-db
          property: connectionString
      # 自动生成一个随机的 SECRET_KEY
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
